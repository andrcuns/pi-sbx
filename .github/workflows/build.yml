name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract pi-coding-agent version
        id: version
        run: |
          VERSION=$(jq -r '.dependencies["@mariozechner/pi-coding-agent"]' package.json)
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ghcr.io/andrcuns/pi-docker:${{ steps.version.outputs.tag }}
          build-args: |
            MISE_VERSION=v2026.5.6
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image
        if: github.event_name == 'pull_request'
        run: docker run --rm ghcr.io/andrcuns/pi-docker:${{ steps.version.outputs.tag }} --version
