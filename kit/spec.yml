schemaVersion: "1"
kind: agent
name: pi
agent:
  image: "ghcr.io/andrcuns/pi-sbx:latest"
  persistence: persistent
  entrypoint:
    run: [pi]

commands:
  install:
    - command: "npm install -g --ignore-scripts @earendil-works/pi-coding-agent"
      user: "1000"
      description: "Install pi coding harness"
  startup:
    - command: "mise install"
      user: "1000"
      description: "Install mise project tools"
